<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vélstafir — Staves of Making</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:#08090d}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const C = {
  bg:"#08090d", gold:"#c8a050",
  text:"#d0c4a0", dim:"#5a5444", dimmer:"#2e2c24", border:"#1c1e28",
};

const VOWEL_STAVE = {
  I: { paths:["M30,8 L30,72"],                                                                         desc:"Pure staff — neutral mouth" },
  A: { paths:["M30,14 L30,66","M30,14 L20,4","M30,14 L40,4","M30,66 L20,76","M30,66 L40,76"],         desc:"Splits at both ends (Y + ∧) — fully open mouth" },
  E: { paths:["M30,8 L30,72","M24,16 L30,8 L36,16","M24,64 L30,72 L36,64"],                           desc:"Outward arrows at both ends — spread, tense lips" },
  O: { paths:["M30,20 L30,60","M30,8 L38,14 L30,20 L22,14 Z","M30,60 L38,66 L30,72 L22,66 Z"],       desc:"Rhombus caps at both ends — rounded, closed lips" },
  U: { paths:["M22,8 L22,72","M38,8 L38,72"],                                                         desc:"Double staff — deep back vowel, tightly rounded" },
};

const CONSONANTS = {
  B:  { ipa:"b",  artic:"Bilabial stop",        shape:"Bilateral bars — both lips pressing shut",               arms:["M30,28 L14,28","M30,28 L46,28","M30,52 L14,52","M30,52 L46,52"] },
  D:  { ipa:"d",  artic:"Alveolar stop",         shape:"Bilateral upward fork — tongue tip surges to ridge",     arms:["M30,22 L14,8","M30,22 L46,8"] },
  G:  { ipa:"ɡ",  artic:"Velar stop",            shape:"Bilateral downward fork — back tongue drops to velum",   arms:["M30,58 L14,72","M30,58 L46,72"] },
  M:  { ipa:"m",  artic:"Bilabial nasal",        shape:"Single bilateral bar — lips sealed, air through nose",   arms:["M30,40 L14,40","M30,40 L46,40"] },
  N:  { ipa:"n",  artic:"Alveolar nasal",        shape:"Left arm up — tongue to ridge, nasal side exit",         arms:["M30,26 L14,10"] },
  NG: { ipa:"ŋ",  artic:"Velar nasal",           shape:"Right arm down — back-mouth nasal, mirror of N",         arms:["M30,54 L46,70"] },
  F:  { ipa:"f",  artic:"Labiodental fricative", shape:"Right arm up — lower lip grazes upper teeth",            arms:["M30,24 L46,10"] },
  S:  { ipa:"s",  artic:"Alveolar sibilant",     shape:"Diagonal through staff — turbulent hissing stream",      arms:["M14,28 L46,52"] },
  SH: { ipa:"ʃ",  artic:"Postalveolar sibilant", shape:"Left chevron — broad friction, tongue drawn back",       arms:["M30,24 L10,40 L30,56"] },
  L:  { ipa:"l",  artic:"Alveolar lateral",      shape:"Left arm down — air escapes laterally only",             arms:["M30,56 L14,68"] },
  R:  { ipa:"r",  artic:"Alveolar trill",        shape:"Three crossbars through staff — repeated tongue pulses", arms:["M14,22 L46,22","M14,40 L46,40","M14,58 L46,58"] },
  H:  { ipa:"h",  artic:"Glottal fricative",     shape:"Four spread arms from center — open glottis, pure air", arms:["M30,40 L14,28","M30,40 L46,28","M30,40 L14,52","M30,40 L46,52"] },
};

const VOWS = ["I","A","E","O","U"];
const CONS = Object.keys(CONSONANTS);

function getGlyphPaths(vowel, consonant) {
  const ps = [...VOWEL_STAVE[vowel].paths];
  if (consonant) ps.push(...CONSONANTS[consonant].arms);
  return ps;
}

function Glyph({ vowel="I", consonant=null, size=52 }) {
  const h = Math.round(size * 80/60);
  return (
    <svg width={size} height={h} viewBox="0 0 60 80">
      {getGlyphPaths(vowel, consonant).map((d,i) => (
        <path key={i} d={d} stroke={C.gold} strokeWidth="2.2"
          fill={d.endsWith("Z") ? `${C.gold}22` : "none"} strokeLinecap="round" strokeLinejoin="round"/>
      ))}
    </svg>
  );
}

function Divider({ title }) {
  return (
    <div style={{ display:"flex", alignItems:"center", gap:12, margin:"28px 0 16px" }}>
      <div style={{ flex:1, height:1, background:`linear-gradient(to right, ${C.gold}44, transparent)` }}/>
      <span style={{ fontSize:9, letterSpacing:4, color:C.gold, textTransform:"uppercase" }}>{title}</span>
      <div style={{ flex:1, height:1, background:`linear-gradient(to left, ${C.gold}44, transparent)` }}/>
    </div>
  );
}

function VowelsTab() {
  return (
    <div>
      <p style={{ color:C.text, fontSize:14, lineHeight:1.9, maxWidth:540, margin:"0 auto 28px", textAlign:"center", opacity:.85 }}>
        Vowels <em>are</em> the staff. The stave's silhouette encodes the vowel; consonant arms are layered on top.
      </p>
      <div style={{ display:"flex", justifyContent:"center", gap:20, flexWrap:"wrap" }}>
        {VOWS.map(v => (
          <div key={v} style={{ textAlign:"center", maxWidth:130 }}>
            <div style={{ background:`${C.gold}0e`, border:`1px solid ${C.gold}33`, padding:"14px 16px", marginBottom:10, display:"inline-block" }}>
              <Glyph vowel={v} size={58} />
            </div>
            <div style={{ fontSize:22, color:C.gold, marginBottom:5 }}>{v}</div>
            <div style={{ fontSize:11, color:C.dim, lineHeight:1.65 }}>{VOWEL_STAVE[v].desc}</div>
          </div>
        ))}
      </div>
      <Divider title="Combined examples" />
      <div style={{ display:"flex", justifyContent:"center", gap:10, flexWrap:"wrap" }}>
        {[["B","A"],["D","O"],["R","U"],["S","E"],["SH","I"],["NG","A"]].map(([c,v]) => (
          <div key={c+v} style={{ textAlign:"center" }}>
            <div style={{ background:C.border, border:`1px solid ${C.gold}22`, padding:"10px 12px" }}>
              <Glyph vowel={v} consonant={c} size={52} />
            </div>
            <div style={{ fontSize:12, color:C.text, marginTop:5 }}>{c}{v}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function ConsonantsTab() {
  const [sel, setSel] = useState(null);
  const info = sel ? CONSONANTS[sel] : null;
  return (
    <div>
      <p style={{ color:C.text, fontSize:14, lineHeight:1.9, maxWidth:540, margin:"0 auto 22px", textAlign:"center", opacity:.85 }}>
        12 consonants covering the major places and manners of articulation. All shown on an I-staff. Click to read the articulatory logic.
      </p>
      <div style={{ display:"flex", flexWrap:"wrap", gap:8, justifyContent:"center", marginBottom:14 }}>
        {CONS.map(c => (
          <div key={c} onClick={() => setSel(sel===c ? null : c)} style={{
            padding:"12px 10px", textAlign:"center", cursor:"pointer", minWidth:72,
            background: sel===c ? `${C.gold}18` : `${C.gold}07`,
            border:`1px solid ${sel===c ? C.gold+"88" : C.gold+"20"}`,
            transition:"all 0.15s",
          }}>
            <Glyph vowel="I" consonant={c} size={46} />
            <div style={{ fontSize:14, color:C.gold, marginTop:4 }}>{c}</div>
            <div style={{ fontSize:9, color:C.dim, letterSpacing:1 }}>/{CONSONANTS[c].ipa}/</div>
          </div>
        ))}
      </div>
      <div style={{ padding:20, background:`${C.gold}08`, border:`1px solid ${C.gold}22`, textAlign:"center", minHeight:76 }}>
        {info
          ? <><div style={{ fontSize:15, color:C.gold, marginBottom:7 }}>{sel} &nbsp;/{info.ipa}/ &nbsp;·&nbsp; {info.artic}</div>
               <div style={{ fontSize:13, color:C.dim }}>{info.shape}</div></>
          : <div style={{ color:C.dimmer, fontSize:13, fontStyle:"italic", paddingTop:14 }}>Click a glyph to see its articulatory logic</div>
        }
      </div>
      <Divider title="Phonetic coverage" />
      <div style={{ maxWidth:560, margin:"0 auto" }}>
        {[
          { group:"Stops",      items:["B  bilabial","D  alveolar","G  velar"] },
          { group:"Nasals",     items:["M  bilabial","N  alveolar","NG  velar"] },
          { group:"Fricatives", items:["F  labiodental","S  alveolar","SH  postalveolar","H  glottal"] },
          { group:"Sonorants",  items:["L  lateral","R  trill"] },
        ].map(row => (
          <div key={row.group} style={{ display:"flex", gap:12, padding:"10px 0", borderBottom:`1px solid ${C.border}` }}>
            <div style={{ width:88, flexShrink:0, fontSize:11, color:C.gold, letterSpacing:1 }}>{row.group}</div>
            <div style={{ fontSize:12, color:C.dim, lineHeight:1.9 }}>{row.items.join("  ·  ")}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function ChartTab() {
  const [sel, setSel] = useState(null);
  return (
    <div>
      <p style={{ color:C.text, fontSize:13, lineHeight:1.9, maxWidth:500, margin:"0 auto 18px", textAlign:"center", opacity:.8 }}>
        60 syllables. Vowels across the top, consonants down the left. Click any glyph.
      </p>
      <div style={{ overflowX:"auto" }}>
        <table style={{ borderCollapse:"collapse", margin:"0 auto" }}>
          <thead>
            <tr>
              <td style={{ padding:"3px 8px", color:C.dim, fontSize:9 }}>C\V</td>
              {VOWS.map(v => (
                <td key={v} style={{ padding:"4px 10px", color:C.gold, fontSize:11, textAlign:"center" }}>{v}</td>
              ))}
            </tr>
          </thead>
          <tbody>
            {CONS.map(c => (
              <tr key={c}>
                <td style={{ padding:"2px 8px", color:C.gold, fontSize:9, letterSpacing:1 }}>{c}</td>
                {VOWS.map(v => {
                  const isSel = sel && sel.c===c && sel.v===v;
                  return (
                    <td key={v} style={{ padding:"2px 3px", cursor:"pointer", textAlign:"center" }}
                        onClick={() => setSel(isSel ? null : {c,v})}>
                      <div style={{ display:"inline-block", padding:"2px 3px",
                        background: isSel ? `${C.gold}18` : "transparent",
                        border:`1px solid ${isSel ? C.gold+"66" : "transparent"}` }}>
                        <Glyph vowel={v} consonant={c} size={30} />
                      </div>
                    </td>
                  );
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {sel && (
        <div style={{ maxWidth:300, margin:"20px auto 0", padding:18, textAlign:"center", background:`${C.gold}0b`, border:`1px solid ${C.gold}44` }}>
          <div style={{ display:"flex", justifyContent:"center", marginBottom:8 }}>
            <Glyph vowel={sel.v} consonant={sel.c} size={70} />
          </div>
          <div style={{ fontSize:28, color:C.gold, letterSpacing:2 }}>{sel.c}{sel.v}</div>
          <div style={{ fontSize:11, color:C.dim, marginTop:8, lineHeight:1.8 }}>
            <div><span style={{ color:C.gold }}>{sel.v}:</span> {VOWEL_STAVE[sel.v].desc}</div>
            <div><span style={{ color:C.gold }}>{sel.c} /{CONSONANTS[sel.c].ipa}/:</span> {CONSONANTS[sel.c].artic}</div>
          </div>
        </div>
      )}
    </div>
  );
}

function WriteTab() {
  const [text, setText] = useState([]);
  const [pendingV, setPendingV] = useState(null);
  const [pendingC, setPendingC] = useState(null);

  const commit = (v, c) => { setText(t => [...t, {v, c}]); setPendingV(null); setPendingC(null); };
  const selectV = (v) => { const nv = pendingV===v ? null : v; if (nv && pendingC) { commit(nv, pendingC); return; } setPendingV(nv); };
  const selectC = (c) => { const nc = pendingC===c ? null : c; if (nc && pendingV) { commit(pendingV, nc); return; } setPendingC(nc); };
  const addSpace = () => { setPendingV(null); setPendingC(null); setText(t => [...t, {space:true}]); };
  const backspace = () => { if (pendingV || pendingC) { setPendingV(null); setPendingC(null); return; } setText(t => t.slice(0,-1)); };

  // Build transliteration string
  const translit = text.map(s => s.space ? " " : (s.c || "") + s.v).join("\u00b7").replace(/·\s·/g," ").replace(/^\s|\s$/g,"");

  const exportSVG = () => {
    const scale = 44/60, gW = 44, gH = Math.round(44*80/60), pad = 16, spaceW = 26, gap = 6;
    let totalW = pad * 2;
    text.forEach(s => { totalW += s.space ? spaceW : gW + gap; });
    if (totalW < pad * 2 + gW) totalW = pad * 2 + gW;
    const totalH = gH + pad * 2;
    const sw = (2.2 / scale).toFixed(2);
    let inner = `<rect width="${totalW}" height="${totalH}" fill="#08090d"/>`;
    let x = pad;
    text.forEach(s => {
      if (s.space) { x += spaceW; return; }
      inner += `<g transform="translate(${x},${pad}) scale(${scale})">`;
      getGlyphPaths(s.v, s.c).forEach(d => {
        inner += `<path d="${d}" stroke="#c8a050" stroke-width="${sw}" fill="${d.endsWith("Z") ? "#c8a05033" : "none"}" stroke-linecap="round" stroke-linejoin="round"/>`;
      });
      inner += `</g>`;
      x += gW + gap;
    });
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${totalW}" height="${totalH}">${inner}</svg>`;
    const blob = new Blob([svg], {type:"image/svg+xml"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "velstafir.svg"; a.click();
    URL.revokeObjectURL(url);
  };

  const btnBase = (active) => ({
    padding:"9px 10px", cursor:"pointer", fontFamily:"Georgia,serif", fontSize:11,
    border:`1px solid ${active ? C.gold+"88" : C.gold+"25"}`,
    background: active ? `${C.gold}22` : `${C.gold}07`,
    color: active ? C.gold : C.dim, transition:"all 0.1s", textAlign:"center",
  });

  return (
    <div>
      {/* Glyph display */}
      <div style={{ minHeight:100, background:`${C.gold}05`, border:`1px solid ${C.gold}22`,
        padding:"12px 14px", marginBottom:0, display:"flex", flexWrap:"wrap",
        gap:5, alignItems:"center" }}>
        {text.length===0 && !pendingV && !pendingC &&
          <span style={{ color:C.dimmer, fontSize:13, fontStyle:"italic" }}>Pick a vowel and a consonant to write a syllable…</span>
        }
        {text.map((s, i) =>
          s.space
            ? <div key={i} style={{ width:22 }}/>
            : <div key={i} style={{ background:`${C.gold}0a`, border:`1px solid ${C.gold}1a`, padding:"4px 6px" }}>
                <Glyph vowel={s.v} consonant={s.c} size={44} />
              </div>
        )}
        {(pendingV || pendingC) &&
          <div style={{ background:`${C.gold}14`, border:`1.5px dashed ${C.gold}55`, padding:"4px 6px", opacity:.75 }}>
            <Glyph vowel={pendingV || "I"} consonant={pendingC} size={44} />
          </div>
        }
      </div>

      {/* Transliteration */}
      <div style={{ background:`${C.gold}08`, border:`1px solid ${C.gold}18`, borderTop:"none",
        padding:"7px 14px", marginBottom:20, minHeight:28 }}>
        {translit
          ? <span style={{ fontSize:14, color:C.dim, letterSpacing:2, fontFamily:"Georgia,serif" }}>{translit}</span>
          : <span style={{ fontSize:12, color:C.dimmer, fontStyle:"italic" }}>transliteration</span>
        }
      </div>

      {/* Vowel keyboard */}
      <div style={{ marginBottom:12 }}>
        <div style={{ fontSize:9, letterSpacing:3, color:C.dim, marginBottom:7 }}>VOWEL</div>
        <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
          {VOWS.map(v => (
            <button key={v} onClick={() => selectV(v)} style={{ ...btnBase(pendingV===v), minWidth:66 }}>
              <div style={{ display:"flex", justifyContent:"center", marginBottom:4 }}>
                <Glyph vowel={v} size={32} />
              </div>
              {v}
            </button>
          ))}
        </div>
      </div>

      {/* Consonant keyboard */}
      <div style={{ marginBottom:16 }}>
        <div style={{ fontSize:9, letterSpacing:3, color:C.dim, marginBottom:7 }}>CONSONANT</div>
        <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
          {CONS.map(c => (
            <button key={c} onClick={() => selectC(c)} style={{ ...btnBase(pendingC===c), minWidth:58 }}>
              <div style={{ display:"flex", justifyContent:"center", marginBottom:3 }}>
                <Glyph vowel="I" consonant={c} size={28} />
              </div>
              {c}
            </button>
          ))}
        </div>
      </div>

      {/* Controls */}
      <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
        <button onClick={addSpace} style={{ padding:"8px 18px", cursor:"pointer", fontFamily:"Georgia,serif", background:`${C.gold}07`, border:`1px solid ${C.gold}30`, color:C.dim, fontSize:11, letterSpacing:1 }}>SPACE</button>
        <button onClick={backspace} style={{ padding:"8px 18px", cursor:"pointer", fontFamily:"Georgia,serif", background:`${C.gold}07`, border:`1px solid ${C.gold}30`, color:C.dim, fontSize:11, letterSpacing:1 }}>← BACK</button>
        <button onClick={exportSVG} disabled={text.length===0} style={{
          padding:"8px 20px", cursor: text.length>0 ? "pointer" : "not-allowed",
          fontFamily:"Georgia,serif", fontSize:11, letterSpacing:1, marginLeft:"auto",
          background: text.length>0 ? `${C.gold}18` : `${C.gold}05`,
          border:`1px solid ${text.length>0 ? C.gold+"88" : C.gold+"20"}`,
          color: text.length>0 ? C.gold : C.dimmer,
        }}>EXPORT SVG ↓</button>
      </div>
    </div>
  );
}

const TABS = [
  { id:"vowels",     label:"Vowels" },
  { id:"consonants", label:"Consonants" },
  { id:"chart",      label:"Full Chart" },
  { id:"write",      label:"Write" },
];

function App() {
  const [tab, setTab] = useState("vowels");
  return (
    <div style={{ minHeight:"100vh", background:`radial-gradient(ellipse at 50% 0%, #0d1118 0%, ${C.bg} 70%)`,
      color:C.text, fontFamily:"Georgia,serif", padding:"28px 20px 60px" }}>
      <div style={{ textAlign:"center", marginBottom:30 }}>
        <div style={{ display:"flex", justifyContent:"center", gap:8, opacity:.3, marginBottom:12 }}>
          {[["A","R"],["I","D"],["O","M"],["U","S"],["E","N"]].map(([v,c],i) => (
            <Glyph key={i} vowel={v} consonant={c} size={26} />
          ))}
        </div>
        <div style={{ fontSize:9, letterSpacing:5, color:C.dim, marginBottom:7 }}>SYLLABIC SCRIPT · TTRPG</div>
        <h1 style={{ fontSize:40, color:C.gold, margin:0, fontWeight:"normal", letterSpacing:5, textShadow:`0 0 40px ${C.gold}44` }}>The Vélstafir</h1>
        <div style={{ fontSize:11, color:C.dim, marginTop:7, letterSpacing:2 }}>Staves of Making</div>
        <div style={{ width:200, height:1, background:`linear-gradient(to right, transparent, ${C.gold}, transparent)`, margin:"14px auto 0" }}/>
      </div>
      <div style={{ display:"flex", justifyContent:"center", gap:3, marginBottom:30, flexWrap:"wrap" }}>
        {TABS.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{
            padding:"8px 22px", cursor:"pointer", fontSize:12, letterSpacing:1,
            fontFamily:"Georgia,serif", transition:"all 0.15s",
            background: tab===t.id ? `${C.gold}18` : "transparent",
            border:`1px solid ${tab===t.id ? C.gold+"99" : C.gold+"25"}`,
            color: tab===t.id ? C.gold : C.dim,
          }}>{t.label}</button>
        ))}
      </div>
      <div style={{ maxWidth:900, margin:"0 auto" }}>
        {tab==="vowels"     && <VowelsTab />}
        {tab==="consonants" && <ConsonantsTab />}
        {tab==="chart"      && <ChartTab />}
        {tab==="write"      && <WriteTab />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
