<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>418, я чайник</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0e0c08;
      color: #ede0c4;
      font-family: 'Palatino Linotype', Palatino, Georgia, serif;
      max-width: 720px;
      margin: 0 auto;
      padding: 60px 32px 80px;
      line-height: 1.75;
    }

    .back-link {
      display: inline-block;
      color: #7a5c1e;
      text-decoration: none;
      font-size: 0.85em;
      letter-spacing: 0.08em;
      margin-bottom: 40px;
      border-bottom: 1px solid transparent;
      transition: border-color 0.15s, color 0.15s;
    }
    .back-link:hover { color: #c9922a; border-color: #7a5c1e; }
    .back-link::before { content: "← "; }

    h1 {
      color: #c9922a;
      font-size: 2em;
      font-weight: normal;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #7a5c1e;
      font-style: italic;
      font-size: 0.95em;
      margin-bottom: 36px;
    }

    hr {
      border: none;
      border-top: 1px solid #2e2010;
      margin: 32px 0;
    }

    h2 {
      color: #c9922a;
      font-size: 1.15em;
      font-weight: normal;
      letter-spacing: 0.05em;
      margin: 28px 0 10px;
    }

    p { margin-bottom: 16px; }

    blockquote {
      border-left: 2px solid #7a5c1e;
      padding-left: 20px;
      margin: 24px 0;
      color: #b8a888;
      font-style: italic;
    }

    .meta-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88em;
      margin: 24px 0;
    }
    .meta-table td {
      padding: 7px 12px;
      border-bottom: 1px solid #1e160a;
    }
    .meta-table td:first-child {
      color: #7a5c1e;
      width: 140px;
      font-size: 0.82em;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <a class="back-link" href="../index.html">Назад до мапи</a>

  <h1>Тут нічого немає</h1>
  <p class="subtitle">принаймні поки що</p>

  <hr />

</body>
</html>
